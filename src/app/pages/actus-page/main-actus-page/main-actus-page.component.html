@for (actu of actus; track $index) {
<div class="actu-panel">
  <div><img [src]="actu.image | noImage" /></div>
  <div>
    <a class="actu-titre">{{ actu.titre }}</a>
    <div class="flex-row flex-margin">
      <div class="actu-date">{{ actu.date | date: "dd MMM yyyy" }}</div>
      <div class="actu-comment">{{ actu.nbComment }} Commentaires</div>
    </div>
    <div class="actu-desc">{{ actu.description }}</div>
  </div>
</div>
}
